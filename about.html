<DOCTYPE html>
    <html>
        <head>
            <title>Take That</title>
            <meta name="viewport" content="width=device-width">
            <link rel="stylesheet" href="css/styles.css">
            <script src="js/includes.js" defer></script>
        </head>
        <body> 
            <!-- Header -->
            <div id="site-header"></div>
            <!-- End Header -->
             <div id="about-data">
                
             </div>
            <div style="padding: 4em;">
                <form action="https://formspree.io/f/mgopydva" method="POST" id="contact">
                    <div id="required">
                        <label>Name*
                            <input for="name" type="text" name="name" id="name" required>
                        </label>

                        <label>Email*
                            <input for="email" type="email" name="email" id="email" required>
                        </label>
                    </div>
                    
                    <label>Message
                        <textarea rows="6" cols="40" name="message" id="message"></textarea>
                    </label>
                </form>

                <div class="button">
                    <button type="submit">Send</button>
                </div>
            </div>
            

            <div id="footnote">
                <i><small>Computer Squared LLC&trade;</small></i>
            </div>
        </body>
    </html>
</DOCTYPE>
