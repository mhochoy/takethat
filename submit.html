<DOCTYPE html>
    <html>
        <head>
            <title>Take That</title>
            <meta name="viewport" content="width=device-width">
            <link rel="stylesheet" href="css/styles.css">
            <script src="js/includes.js" defer></script>
            <script src="/html/takethat/js/submit.js" type="text/javascript"></script>
        </head>
        <body> 
            <!-- Header -->
            <div id="site-header"></div>
            <!-- End Header -->

            <div id="submit-take">
                <h3>What's Your Take?</h3>
                <form>
                    <label>Name:<br>
                        <input for="name" type="text" name="name" id="name" required>
                    </label>
                    <br>
                    <label>Take:
                        <textarea for="message" name="message" rows="4" cols="" id="message" required></textarea>
                    </label>

                    <div id="extras">
                        <label for="category">
                            Category
                            <select>
                                <option>General</option>
                                <option>Food</option>
                                <option>Gaming</option>
                            </select>
                        </label>

                        <label for="allow_reactions">
                            Allow Reactions
                            <input type="checkbox">
                        </label>

                        <label>
                            Self-Destruct
                            <input type="radio">
                        </label>
                    </div>
                    
                    <div class="button">
                        <button type="submit" onsubmit="">Send</button>
                    </div>
                    
                </form>
            </div>

            <div id="footnote">
                <i><small>Computer Squared LLC&trade;</small></i>
            </div>
        </body>
    </html>
</DOCTYPE>
